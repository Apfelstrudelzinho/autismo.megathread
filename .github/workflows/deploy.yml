name: Deploy VitePress site to Pages

on:
  # Executa em pushes direcionados à branch `main`.
  push:
    branches: [main]

  # Permite executar manualmente este fluxo de trabalho na guia Actions
  workflow_dispatch:

# Define permissões GITHUB_TOKEN para a implantação no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permite apenas uma implantação simultânea, pulando execuções em fila
# entre a. No entanto, NÃO cancela execuções em andamento, pois queremos
# permitir que essas implantações de produção sejam concluídas.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Trabalho de compilação
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Não necessário se lastUpdated não estiver habilitado

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Use a mesma versão do Node.js que você instalou
          cache: npm # ou 'yarn', 'pnpm', 'bun' dependendo do seu gerenciador de pacotes

      - name: Install dependencies
        run: npm install # ou 'pnpm install', 'yarn install', 'bun install'

      - name: Build with VitePress
        run: npm run docs:build # Verifique o script de build no seu package.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist # Verifique o diretório de saída do seu build

  # Trabalho de implantação
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4